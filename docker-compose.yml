services:
  neo4j:
    image: neo4j:5
    container_name: rag-platform-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol (driver connection)
    environment:
      NEO4J_AUTH: neo4j/ragplatform
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "ragplatform", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build: .
    container_name: rag-platform-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override graph DB URI to use the Docker service name, not localhost
      RAGPLATFORM_GRAPH_DB_URI: bolt://neo4j:7687
      RAGPLATFORM_GRAPH_DB_PASSWORD: ragplatform
    volumes:
      - ./data:/app/data      # read-write: uploads need to persist to disk
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: rag-platform-frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rag-platform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

volumes:
  neo4j_data:
